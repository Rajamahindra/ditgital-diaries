<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="dGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="50%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="penGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="60%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="48" height="48" rx="12" fill="url(#bgGrad)"/>
  <rect width="48" height="48" rx="12" fill="url(#glowGrad)" opacity="0.6"/>

  <!-- Border -->
  <rect x="0.75" y="0.75" width="46.5" height="46.5" rx="11.25" stroke="url(#dGrad)" stroke-width="1.5" opacity="0.5"/>

  <!-- D letterform -->
  <path d="M11 10 L11 38 L24 38 C33.5 38 40 32 40 24 C40 16 33.5 10 24 10 Z
           M17 16 L23.5 16 C29.8 16 34 19.6 34 24 C34 28.4 29.8 32 23.5 32 L17 32 Z"
    fill="url(#dGrad)" opacity="0.9"/>

  <!-- Pen nib accent inside D -->
  <path d="M20 28 L24 18 L28 28 L24 26 Z" fill="url(#penGrad)" opacity="0.85" filter="url(#glow)"/>

  <!-- Center glow dot -->
  <circle cx="24" cy="24" r="2.5" fill="#E0D7FF" opacity="0.7" filter="url(#glow)"/>

  <!-- Network dots -->
  <circle cx="16" cy="16" r="1" fill="#A78BFA" opacity="0.5"/>
  <circle cx="34" cy="14" r="1" fill="#818CF8" opacity="0.5"/>
  <circle cx="36" cy="32" r="1" fill="#A78BFA" opacity="0.5"/>
  <line x1="16" y1="16" x2="24" y2="24" stroke="#A78BFA" stroke-width="0.5" opacity="0.3"/>
  <line x1="34" y1="14" x2="24" y2="24" stroke="#818CF8" stroke-width="0.5" opacity="0.3"/>
  <line x1="36" y1="32" x2="24" y2="24" stroke="#A78BFA" stroke-width="0.5" opacity="0.3"/>
</svg>
